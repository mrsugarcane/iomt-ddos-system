# Optional reverse proxy for production deployment behind a real domain.
#
# Local docker-compose does NOT use this file — the frontend container talks
# to the backend container directly cross-origin (CORS is configured in
# server.js via ALLOWED_ORIGINS). Use this instead if you're putting the
# whole system behind a single domain with TLS, e.g. sentinel.yourhospital.org
#
# Usage: point this at your domain, get a cert (e.g. via certbot), and route
# both the frontend and backend containers through it.

upstream sentinel_backend {
    server backend:4000;
    keepalive 32;
}

upstream sentinel_frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name sentinel.example.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sentinel.example.org;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    client_max_body_size 1m;

    # API + auth + alerts
    location /api/ {
        proxy_pass http://sentinel_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Server-Sent Events — disable buffering, raise timeout
    location /api/stream {
        proxy_pass http://sentinel_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 1h;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend SPA
    location / {
        proxy_pass http://sentinel_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

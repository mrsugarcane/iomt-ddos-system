services:
  - type: web
    name: sentinel-backend
    env: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        sync: false # You will type this manually in the dashboard
    disk:
      name: db-volume
      mountPath: /app/db_data
      sizeGB: 1

  - type: web # Change to 'static' if it's a pure Vite/React app
    name: sentinel-frontend
    env: docker
    dockerContext: .
    dockerfilePath: frontend/Dockerfile
